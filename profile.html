<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POLARIS — Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <canvas id="stars-canvas"></canvas>

  <nav class="nav" id="main-nav">
    <div class="nav-logo"><a href="index.html">POLARIS ✦</a></div>
    <ul class="nav-links">
      <li><a href="facts.html">SPACE FACTS</a></li>
      <li><a href="nights.html">STARRY NIGHTS</a></li>
      <li><a href="exams.html">EXAMS</a></li>
    </ul>
  </nav>

  <section class="page-hero" style="min-height:50vh;">
    <div class="page-hero-content" style="animation: fadeUp 1s ease 0.2s both;">
      <span class="page-tag" id="profile-tag">PROFILE</span>
      <h1 class="page-title" id="profile-username" style="font-size:clamp(1.5rem,4vw,3rem);">Loading...</h1>
      <p class="page-subtitle" id="profile-meta" style="font-size:0.85rem;"></p>
    </div>
  </section>

  <section class="content-section" id="profile-section">
    <div id="profile-own-actions" style="display:none;margin-bottom:2rem;text-align:center;">
      <a href="submit.html" class="cta-btn">SUBMIT A PHOTO</a>
      <a href="submit-article.html" class="cta-btn" style="margin-left:0.75rem;">SUBMIT AN ARTICLE</a>
      <button id="logout-btn" class="cta-btn" style="margin-left:0.75rem;border-color:rgba(239,68,68,0.4);color:#ef4444;">SIGN OUT</button>
    </div>

    <div id="profile-submissions">
      <h2 style="font-family:var(--font-display);font-size:clamp(1.2rem,2vw,1.5rem);letter-spacing:0.15em;margin-bottom:1.5rem;text-align:center;">PHOTO SUBMISSIONS</h2>
      <div id="submissions-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;"></div>
      <div id="submissions-empty" style="display:none;text-align:center;padding:3rem;color:var(--muted);font-family:var(--font-serif);"></div>
    </div>

    <div id="profile-articles" style="margin-top:3rem;">
      <h2 style="font-family:var(--font-display);font-size:clamp(1.2rem,2vw,1.5rem);letter-spacing:0.15em;margin-bottom:1.5rem;text-align:center;">ARTICLE SUBMISSIONS</h2>
      <div id="articles-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;"></div>
      <div id="articles-empty" style="display:none;text-align:center;padding:3rem;color:var(--muted);font-family:var(--font-serif);"></div>
    </div>
  </section>

  <div id="lightbox" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);justify-content:center;align-items:center;cursor:zoom-out;" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 4px 40px rgba(0,0,0,0.6);" />
  </div>

  <footer>
    <div class="footer-logo">POLARIS ✦</div>
    <div class="footer-copy">&copy; 2026 POLARIS. ALL RIGHTS RESERVED.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="stars.js"></script>
  <script src="page.js"></script>
  <script>
    document.addEventListener('auth-ready', async function () {
      const params = new URLSearchParams(window.location.search);
      const targetUsername = params.get('username');
      const usernameEl = document.getElementById('profile-username');
      const metaEl = document.getElementById('profile-meta');
      const tagEl = document.getElementById('profile-tag');
      const grid = document.getElementById('submissions-grid');
      const empty = document.getElementById('submissions-empty');
      const ownActions = document.getElementById('profile-own-actions');
      const logoutBtn = document.getElementById('logout-btn');

      if (!targetUsername) {
        const profile = AUTH.getProfile();
        if (profile && profile.username) {
          window.location.search = '?username=' + encodeURIComponent(profile.username);
          return;
        }
        usernameEl.textContent = 'No profile specified.';
        metaEl.textContent = 'Use ?username=yourname in the URL.';
        return;
      }

      const { data: profile, error: profileErr } = await polarisDb
        .from('profiles')
        .select('*')
        .eq('username', targetUsername.toLowerCase())
        .single();

      if (profileErr || !profile) {
        usernameEl.textContent = 'Profile not found';
        metaEl.textContent = 'No user with that username.';
        return;
      }

      var displayName = profile.display_name || profile.username.toUpperCase();
      var adminBadge = profile.is_admin ? ' <span class="admin-badge">ADMIN</span>' : '';
      usernameEl.innerHTML = displayName + adminBadge;
      tagEl.textContent = '@' + profile.username + (profile.is_admin ? ' ✦ ADMIN' : '');
      const joined = new Date(profile.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      metaEl.textContent = 'Joined ' + joined;

      const currentUser = AUTH.getUser();
      if (currentUser && currentUser.id === profile.id) {
        ownActions.style.display = 'block';
      }

      logoutBtn.addEventListener('click', async function () {
        await AUTH.signOut();
      });

      const { data: submissions, error: subErr } = await polarisDb
        .from('submissions')
        .select('*')
        .eq('user_id', profile.id)
        .order('created_at', { ascending: false });

      if (subErr || !submissions || !submissions.length) {
        empty.style.display = 'block';
        empty.textContent = 'No photos submitted yet.';
        return;
      }

      const isOwnProfile = currentUser && currentUser.id === profile.id;
      const visibleSubs = isOwnProfile ? submissions : submissions.filter(s => s.status === 'approved');

      if (!visibleSubs.length) {
        empty.style.display = 'block';
        empty.textContent = isOwnProfile ? 'No submissions yet. Submit your first sky photo!' : 'No approved submissions yet.';
        return;
      }

      function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
      }

      grid.innerHTML = visibleSubs.map(function (s) {
        const statusBadge = isOwnProfile
          ? '<span class="status-badge status-' + s.status + '">' + s.status.toUpperCase() + '</span>'
          : '';
        const dateStr = new Date(s.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        return '' +
          '<div class="submission-card">' +
            '<div class="submission-img-wrap">' +
              '<img src="' + s.image_url + '" alt="Sky photo" class="submission-img" loading="lazy" onclick="openLightbox(\'' + s.image_url + '\')" style="cursor:pointer;" />' +
            '</div>' +
            '<div class="submission-info">' +
              '<div class="submission-meta">' + dateStr + ' &middot; ' + (s.location || 'Unknown location') + '</div>' +
              '<p class="submission-desc">' + (s.description || '') + '</p>' +
              statusBadge +
            '</div>' +
          '</div>';
      }).join('');

      const { data: articles, error: artErr } = await polarisDb
        .from('article_submissions')
        .select('*')
        .eq('user_id', profile.id)
        .order('created_at', { ascending: false });

      const artGrid = document.getElementById('articles-grid');
      const artEmpty = document.getElementById('articles-empty');

      if (artErr || !articles || !articles.length) {
        artEmpty.style.display = 'block';
        artEmpty.textContent = 'No articles submitted yet.';
        return;
      }

      const visibleArts = isOwnProfile ? articles : articles.filter(a => a.status === 'approved');
      if (!visibleArts.length) {
        artEmpty.style.display = 'block';
        artEmpty.textContent = isOwnProfile ? 'No articles submitted yet.' : 'No approved articles yet.';
        return;
      }

      const pageLabels = { facts: 'Space Facts', nights: 'Starry Nights', exams: 'Exams & Scholarships' };
      artGrid.innerHTML = visibleArts.map(function (a) {
        const statusBadge = isOwnProfile
          ? '<span class="status-badge status-' + a.status + '">' + a.status.toUpperCase() + '</span>'
          : '';
        const dateStr = new Date(a.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const imgBlock = a.image_url
          ? '<img src="' + a.image_url + '" alt="" style="width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:0.5rem;" loading="lazy" />'
          : '';
        return '' +
          '<div class="submission-card">' +
            '<div class="submission-info">' +
              imgBlock +
              '<div class="submission-meta">' + dateStr + ' &middot; ' + (pageLabels[a.page] || a.page) + '</div>' +
              '<h3 style="font-family:var(--font-display);font-size:0.85rem;letter-spacing:0.1em;margin:0.25rem 0;">' + a.title + '</h3>' +
              '<p class="submission-desc">' + a.content.substring(0, 150) + (a.content.length > 150 ? '...' : '') + '</p>' +
              statusBadge +
            '</div>' +
          '</div>';
      }).join('');
    });
  </script>
</body>
</html>
