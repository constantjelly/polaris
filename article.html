  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('article-title').textContent = 'Article not found';
        document.getElementById('article-body').innerHTML = '<p style="color:var(--muted);">No article ID specified.</p>';
        return;
      }

      const { data, error } = await polarisDb
        .from('articles')
        .select('*')
        .eq('id', id)
        .eq('published', true)
        .single();

      if (error || !data) {
        document.getElementById('article-title').textContent = 'Article not found';
        document.getElementById('article-body').innerHTML = '<p style="color:var(--muted);">This article could not be loaded.</p>';
        return;
      }

      const article = data;
      const pageLabels = { facts: 'SPACE FACTS', nights: 'STARRY NIGHTS', exams: 'EXAMS & SCHOLARSHIPS' };
      const pagePaths = { facts: 'facts.html', nights: 'nights.html', exams: 'exams.html' };

      document.getElementById('article-tag').textContent = pageLabels[article.page] || 'ARTICLE';
      document.getElementById('article-title').textContent = article.title;
      document.getElementById('article-date').textContent = new Date(article.date).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      const backLink = document.getElementById('back-link');
      backLink.href = pagePaths[article.page] || 'index.html';
      backLink.textContent = '\u2190 BACK TO ' + (pageLabels[article.page] || 'HOME');

      const imageHtml = article.image_url
        ? '<div style="margin: 2rem 0;"><img src="' + article.image_url + '" alt="' + article.title + '" style="max-width:100%;border-radius:8px;border:1px solid var(--border);" /></div>'
        : '';

      document.getElementById('article-body').innerHTML = imageHtml + '<div class="article-text">' + article.content.replace(/\n/g, '<br/>') + '</div>';

      document.title = 'POLARIS \u2014 ' + article.title;
    })();
  </script>
